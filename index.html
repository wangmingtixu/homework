<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            width: 1100px;
            height: 650px;
            background-color: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            display: flex;
            overflow: hidden;
        }
        .left-panel {
            width: 50%;
            background: #034484;
            padding: 40px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .title-area {
            margin-top: 60px;
            margin-bottom: 40px;
            color: #fff; /* 文字白色适配蓝色背景 */
        }
        .main-title {
            font-size: 32px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .version-tag {
            background-color: #fff;
            color: #0F4C97;
            font-size: 14px;
            padding: 4px 10px;
            border-radius: 12px;
        }
        .sub-title {
            font-size: 16px;
            margin-top: 12px;
            opacity: 0.9;
        }
        .illustration {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* 图片向上对齐，优化美观度 */
            padding-top: 5px; /* 微调图片顶部间距 */
        }
        .illustration img {
            width: 100%;
            border-radius: 12px;
            object-fit: cover;
        }
        /* 右侧表单区 */
        .right-panel {
            width: 50%;
            padding: 60px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative; /* 关键：给父容器加相对定位，确保子元素绝对定位基于此 */
        }
        .welcome-title {
            font-size: 26px;
            font-weight: 600;
            color: #1d2129;
            margin-bottom: 8px;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        .welcome-subtitle {
            font-size: 16px;
            color: #4e5969;
            margin-bottom: 40px;
        }
        .tab-nav {
            display: flex;
            gap: 24px;
            margin-bottom: 30px;
        }
        .tab-item {
            font-size: 16px;
            color: #4e5969;
            padding-bottom: 8px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tab-item.active {
            color: #0F4C97;
            border-color: #0F4C97;
            font-weight: 500;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group input {
            width: 100%;
            height: 48px;
            padding: 0 16px;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            font-size: 14px;
            color: #1d2129;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #0F4C97;
        }
        .form-group input::placeholder {
            color: #a3adb8;
        }
        /* 仅新增：链接行布局 - 实现两端对齐 */
        .link-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .form-links {
            display: flex;
            justify-content: flex-start;
            gap: 20px;
        }
        .form-links a {
            font-size: 14px;
            color: #0F4C97;
            text-decoration: none;
        }
        /* 仅调整：移除switch-area的margin-top，适配同行布局 */
        .switch-area {
            text-align: right;
        }
        .switch-area a {
            font-size: 14px;
            font-weight: 500;
            color: #0F4C97;
            text-decoration: none;
        }
        .btn {
            width: 100%;
            height: 48px;
            background-color: #0F4C97;
            color: #fff;
            border: none;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #1a5db8;
        }
        .qrcode {
            position: absolute;
            top: 40px;
            right: 40px;
            width: 48px;
            height: 48px;
            display: none;
        }
        .about-link {
            position: absolute;
            top: 40px;
            right: 80px; /* 调整：右移避免和课表重叠 */
            font-size: 14px;
            color: #4e5969;
            text-decoration: none;
            z-index: 10; /* 层级确保显示 */
        }
        /* 修复：课表链接样式（核心调整） */
        .timetable-link {
            position: absolute;
            top: 65px; /* 精准在名字下方 */
            right: 80px; /* 和名字对齐 */
            font-size: 14px;
            color: #0F4C97 !important; /* 强制蓝色，确保生效 */
            text-decoration: none;
            z-index: 10; /* 层级高于背景，确保显示 */
            font-weight: 500; /* 加粗更醒目 */
        }
        .timetable-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- 左侧区域 - 无修改 -->
        <div class="left-panel">
            <div class="title-area">
                <div class="main-title">
                    兰州理工大学
                    <span class="version-tag">LUT</span>
                </div>
                <p class="sub-title">聚焦学生管理与服务升级</p>
            </div>
            <div class="illustration">
                <img src="EFA4C3BE95EED3E8F33EB52D67A9EA49.jpg" alt="建筑背景图">
            </div>
        </div>

        <!-- 右侧登录表单区 -->
        <div class="right-panel">
            <!-- 名字链接 -->
            <a href="#" class="about-link">王明硕 230162402042</a>
            <!-- 课表链接（必显示） -->
            <a href="class.html" class="timetable-link">课表</a>
            
            <div class="qrcode">
                <svg viewBox="0 0 1024 1024" width="48" height="48">
                    <rect x="128" y="128" width="768" height="768" fill="#fff" stroke="#000" stroke-width="64"/>
                    <rect x="256" y="256" width="128" height="128" fill="#000"/>
                    <rect x="256" y="640" width="128" height="128" fill="#000"/>
                    <rect x="640" y="256" width="128" height="128" fill="#000"/>
                </svg>
            </div>
            <div class="welcome-title">
                欢迎登录        
            </div>
            <div class="tab-nav">
                <div class="tab-item active">密码登录</div>
            </div>
            <form>
                <div class="form-group">
                    <input type="text" placeholder="用户名/学号/手机号" id="login-account">
                </div>
                <div class="form-group">
                    <input type="password" placeholder="请输入登录密码" id="login-pwd">
                </div>
                <div class="link-row">
                    <div class="form-links">
                        <a href="#">忘记密码</a>
                    </div>
                    <div class="switch-area">
                        <a href="register.html">立即注册</a>
                    </div>
                </div>
                <button type="button" class="btn">登录</button>
            </form>
        </div>
    </div>
</body>
</html>
